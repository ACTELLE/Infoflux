<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="InfoFlux"/>
  <meta name="theme-color" content="#0d0d1a"/>
  <title>InfoFlux — Veille Mondiale</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#0d0d1a;--surf:#141428;--card:#1a1a30;--card2:#1e1e38;
      --bdr:#252542;--red:#ff3b5c;--yell:#ffd600;--blue:#42a5f5;
      --teal:#26c6a2;--purp:#ab47bc;--grn:#66bb6a;--orange:#ff7043;
      --txt:#f0f0ff;--mid:#9090b8;--dim:#55557a;
    }
    html{background:var(--bg);}
    body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;overflow-x:hidden;}
    a{text-decoration:none;color:inherit;}
    button{font-family:inherit;cursor:pointer;}
    /* ══ WELCOME ══ */
    .welcome{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;text-align:center;opacity:0;pointer-events:none;transform:scale(.97);transition:opacity .55s ease,transform .55s ease;}
    .welcome.show{opacity:1;pointer-events:all;transform:scale(1);}
    .welcome.hide{opacity:0;transform:scale(1.03);pointer-events:none;}
    .wlc-ring{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,var(--red),var(--yell));display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:24px;animation:glow 2.2s ease-in-out infinite;}
    @keyframes glow{0%,100%{box-shadow:0 8px 32px rgba(255,59,92,.4)}50%{box-shadow:0 8px 50px rgba(255,214,0,.55),0 0 80px rgba(255,214,0,.15)}}
    .wlc-salut{font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--yell);margin-bottom:6px;}
    .wlc-name{font-size:38px;font-weight:900;line-height:1.05;margin-bottom:8px;background:linear-gradient(120deg,var(--txt) 30%,var(--yell));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .wlc-date{font-size:13px;color:var(--mid);margin-bottom:26px;}
    .wlc-card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:14px 18px;max-width:310px;margin-bottom:28px;font-size:13px;color:var(--mid);line-height:1.7;}
    .wlc-card span{color:var(--yell);font-weight:700;}
    .wlc-bar{width:220px;height:3px;background:var(--bdr);border-radius:3px;margin-bottom:22px;overflow:hidden;}
    .wlc-bar-f{height:100%;width:0%;background:linear-gradient(90deg,var(--red),var(--yell));border-radius:3px;}
    .wlc-btn{padding:13px 36px;border-radius:28px;border:none;background:linear-gradient(135deg,var(--red),var(--yell));color:#000;font-size:14px;font-weight:800;box-shadow:0 6px 22px rgba(255,59,92,.4);transition:transform .15s;}
    .wlc-btn:active{transform:scale(.95);}
    .wlc-skip{margin-top:14px;font-size:11px;color:var(--dim);cursor:pointer;}
    /* ══ HEADER ══ */
    .hdr{position:sticky;top:0;z-index:40;background:rgba(13,13,26,.97);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--bdr);padding:10px 14px 9px;}
    .hdr-r1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .brand{display:flex;align-items:center;gap:9px;}
    .brand-ico{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--red),var(--yell));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 14px rgba(255,59,92,.35);}
    .brand-name{font-size:21px;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,var(--red),var(--yell));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .brand-sub{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:-2px;}
    .hdr-btns{display:flex;gap:6px;align-items:center;}
    .btn-ref{display:flex;align-items:center;gap:4px;padding:7px 10px;border-radius:18px;background:var(--card);border:1px solid var(--bdr);color:var(--mid);font-size:12px;transition:.2s;}
    .btn-ref:active{background:var(--bdr);}
    .btn-ref.spin .ri{animation:spin .7s linear infinite;display:inline-block;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-ear{display:flex;align-items:center;gap:4px;padding:7px 12px;border-radius:18px;background:linear-gradient(135deg,var(--red),var(--yell));border:none;color:#000;font-size:12px;font-weight:800;box-shadow:0 3px 10px rgba(255,59,92,.4);transition:.2s;}
    .btn-ear:active{transform:scale(.96);}
    .mode-row{display:flex;align-items:center;gap:8px;}
    .btn-audio{flex:1;padding:9px 12px;text-align:center;font-size:12px;border-radius:18px;transition:.2s;white-space:nowrap;font-weight:700;border:1px solid;display:flex;align-items:center;justify-content:center;gap:5px;}
    .btn-audio:active{transform:scale(.96);}
    .btn-audio-short{background:linear-gradient(135deg,var(--red),var(--yell));border-color:transparent;color:#000;font-weight:800;box-shadow:0 3px 10px rgba(255,59,92,.4);}
    .btn-audio-short.playing{background:#000;color:var(--yell);border-color:var(--yell);}
    .btn-audio-full{background:rgba(38,198,162,.12);border-color:var(--teal);color:var(--teal);}
    .btn-audio-full:active,.btn-audio-full.playing{background:var(--teal);color:#000;}
    /* ══ TABS ══ */
    .tabs-wrap{background:var(--surf);border-bottom:1px solid var(--bdr);overflow-x:auto;scrollbar-width:none;}
    .tabs-wrap::-webkit-scrollbar{display:none;}
    .tabs{display:flex;padding:0 10px;}
    .tab{flex-shrink:0;padding:10px 12px;color:var(--dim);font-size:12px;border-bottom:2px solid transparent;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:4px;white-space:nowrap;}
    .tab.on{color:var(--txt);border-bottom-color:var(--yell);}
    .tab-n{background:var(--bdr);color:var(--dim);font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700;}
    .tab.on .tab-n{background:var(--yell);color:#000;}
    /* ══ CONTENU ══ */
    .cnt{max-width:960px;margin:0 auto;padding:12px 12px 96px;}
    .meta-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-size:11px;color:var(--dim);}
    .cat-banner{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:11px 14px;margin-bottom:13px;border-left:4px solid var(--cc,var(--yell));}
    .cat-ico{font-size:24px;}
    .cat-info h2{font-size:14px;font-weight:800;}
    .cat-info p{font-size:11px;color:var(--mid);margin-top:2px;}
    /* ══ SOURCE BLOCKS — Premier aperçu 3/source ══ */
    .apercu-hdr{display:flex;align-items:center;gap:9px;margin:0 0 12px;}
    .apercu-lbl{font-size:12px;font-weight:800;color:var(--yell);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
    .apercu-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(255,214,0,.35),transparent);}
    .apercu-sub{font-size:10px;color:var(--dim);white-space:nowrap;}
    .src-block{background:var(--card);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;margin-bottom:10px;transition:border-color .2s;}
    .src-block:hover{border-color:var(--cc,var(--bdr));}
    .src-block-hdr{display:flex;align-items:center;gap:9px;padding:10px 14px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--bdr);}
    .src-block-flag{font-size:16px;flex-shrink:0;}
    .src-block-name{font-size:13px;font-weight:800;flex:1;color:var(--txt);}
    .src-block-count{font-size:10px;font-weight:700;background:var(--cc,var(--bdr));color:#000;padding:2px 7px;border-radius:9px;}
    .src-block-nhk{font-size:9px;font-weight:700;background:rgba(66,165,245,.18);color:var(--blue);border:1px solid rgba(66,165,245,.3);padding:2px 6px;border-radius:8px;letter-spacing:.4px;}
    .src-block-radio{font-size:9px;font-weight:700;background:rgba(38,198,162,.15);color:var(--teal);border:1px solid rgba(38,198,162,.3);padding:2px 6px;border-radius:8px;}
    .src-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;cursor:pointer;}
    .src-item:last-child{border-bottom:none;}
    .src-item:active{background:var(--card2);}
    .src-item-num{font-size:11px;font-weight:800;color:var(--cc,var(--dim));min-width:18px;padding-top:2px;flex-shrink:0;}
    .src-item-body{flex:1;min-width:0;}
    .src-item-title{font-size:13px;font-weight:600;line-height:1.38;color:var(--txt);margin-bottom:3px;display:block;}
    .src-item-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
    .src-item-time{font-size:10px;color:var(--dim);}
    .src-item-desc{font-size:11px;color:var(--mid);line-height:1.45;margin-top:3px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
    .translated-badge{font-size:9px;background:rgba(66,165,245,.15);color:var(--blue);border:1px solid rgba(66,165,245,.3);padding:1px 5px;border-radius:7px;font-weight:700;letter-spacing:.3px;}
    /* ══ SECTION HDR ══ */
    .sec-hdr{display:flex;align-items:center;gap:9px;margin:20px 0 10px;}
    .sec-lbl{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
    .sec-line{flex:1;height:1px;background:var(--bdr);}
    /* ══ SOUS-CAT ══ */
    .subcat-hdr{display:flex;align-items:center;gap:8px;margin:18px 0 9px;padding:7px 12px;background:var(--card);border-radius:10px;border-left:3px solid var(--cc,var(--yell));}
    .subcat-hdr span{font-size:11px;font-weight:700;color:var(--mid);text-transform:uppercase;letter-spacing:.8px;}
    /* ══ GRID / CARD ══ */
    .grid{display:grid;gap:9px;grid-template-columns:1fr;}
    @media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
    @media(min-width:840px){.grid{grid-template-columns:1fr 1fr 1fr}}
    .card{display:block;background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:12px;transition:all .18s;position:relative;overflow:hidden;}
    .card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cc,var(--yell));border-radius:3px 0 0 3px;}
    .card:active{background:var(--card2);transform:translateY(-1px);}
    .card-long .card-desc{-webkit-line-clamp:3;}
    .src-tag{display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,.05);border:1px solid var(--bdr);padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;color:var(--cc,var(--blue));}
    .time-tag{font-size:10px;color:var(--dim);}
    .card-meta{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:7px;}
    .card-title{font-size:13px;font-weight:600;line-height:1.38;margin-bottom:5px;}
    .card-desc{font-size:12px;color:var(--mid);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    /* ══ FEATURED ══ */
    .featured{display:block;position:relative;overflow:hidden;background:linear-gradient(150deg,var(--card),var(--surf));border:1px solid var(--bdr);border-radius:16px;padding:17px;margin-bottom:13px;transition:border-color .2s;}
    .featured:active{border-color:var(--yell);}
    .featured::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,59,92,.05),rgba(255,214,0,.05));pointer-events:none;}
    .une-badge{display:inline-flex;align-items:center;gap:4px;background:var(--red);color:#fff;font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:3px 8px;border-radius:8px;margin-bottom:9px;}
    .f-title{font-size:16px;font-weight:700;line-height:1.35;margin-bottom:7px;}
    .f-desc{font-size:13px;color:var(--mid);line-height:1.55;}
    .f-foot{display:flex;align-items:center;gap:7px;margin-top:10px;flex-wrap:wrap;}
    /* ══ MATINALE STRIP ══ */
    .matinale-strip{background:linear-gradient(135deg,rgba(38,198,162,.08),rgba(255,214,0,.04));border:1px solid rgba(38,198,162,.22);border-radius:14px;padding:13px 15px;margin-bottom:14px;}
    .mat-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
    .mat-badge{background:linear-gradient(135deg,var(--teal),#1de9b6);color:#000;font-size:10px;font-weight:800;padding:3px 9px;border-radius:9px;text-transform:uppercase;letter-spacing:.5px;}
    .mat-time{font-size:11px;color:var(--mid);}
    .mat-grid{display:grid;gap:7px;grid-template-columns:1fr;}
    @media(min-width:560px){.mat-grid{grid-template-columns:1fr 1fr}}
    .mat-card{display:block;background:var(--card);border:1px solid rgba(38,198,162,.18);border-radius:10px;padding:10px 12px;transition:.15s;}
    .mat-card:active{background:var(--card2);}
    .mat-src{font-size:10px;font-weight:700;color:var(--teal);margin-bottom:4px;display:flex;align-items:center;gap:5px;}
    .mat-title{font-size:13px;font-weight:600;line-height:1.35;}
    /* ══ WAKE UP ══ */
    .wakeup-card{background:linear-gradient(135deg,rgba(255,214,0,.07),rgba(255,59,92,.05));border:1px solid rgba(255,214,0,.35);border-radius:16px;padding:18px;margin-bottom:14px;}
    .wakeup-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--red),var(--yell));color:#000;font-size:9px;font-weight:800;text-transform:uppercase;padding:4px 10px;border-radius:9px;margin-bottom:11px;letter-spacing:.5px;}
    .wakeup-text{font-size:14px;line-height:1.75;color:var(--txt);}
    .wakeup-foot{margin-top:11px;font-size:11px;color:var(--dim);}
    .headline-list{display:flex;flex-direction:column;gap:5px;}
    .hl-item{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--card);border-radius:9px;border:1px solid var(--bdr);border-left:3px solid var(--cc,var(--yell));transition:.15s;}
    .hl-item:active{background:var(--card2);}
    .hl-title{font-size:12px;font-weight:600;flex:1;min-width:0;line-height:1.3;}
    .hl-meta{display:flex;gap:5px;align-items:center;flex-shrink:0;}
    /* ══ UPDATE ══ */
    .update-feed{display:flex;flex-direction:column;gap:5px;}
    .update-item{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;border-left:3px solid var(--cc,var(--yell));}
    .update-item:active{background:var(--card2);}
    .upd-n{font-size:13px;font-weight:800;color:var(--dim);min-width:20px;padding-top:1px;flex-shrink:0;}
    .upd-body{flex:1;min-width:0;}
    .upd-title{font-size:13px;font-weight:600;line-height:1.3;display:block;margin-bottom:4px;}
    .upd-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
    .upd-synth{font-size:12px;color:var(--mid);line-height:1.45;margin:4px 0 6px;font-style:italic;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
    /* ══ TIME TO READ — 4 paragraphes ══ */
    .ttr-section{background:var(--card);border:1px solid var(--bdr);border-left:4px solid var(--cc,var(--yell));border-radius:14px;padding:16px 18px;margin-bottom:14px;}
    .ttr-section-hdr{display:flex;align-items:center;gap:7px;margin-bottom:12px;}
    .ttr-section-badge{font-size:9px;font-weight:800;background:var(--cc,var(--yell));color:#000;text-transform:uppercase;padding:3px 8px;border-radius:8px;letter-spacing:.5px;}
    .ttr-para{font-size:13px;line-height:1.65;color:var(--txt);margin-bottom:11px;padding-bottom:11px;border-bottom:1px solid var(--bdr);}
    .ttr-para:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
    .ttr-para .ttr-src{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--cc,var(--blue));text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
    .ttr-para .ttr-link{color:var(--txt);font-weight:700;border-bottom:1px dotted var(--mid);}
    .ttr-para .ttr-link:hover{border-bottom-color:var(--cc,var(--yell));}
    .ttr-para .ttr-body{display:block;margin-top:3px;color:var(--mid);}
    /* ══ BADGES ══ */
    .radio-badge{display:inline-flex;align-items:center;gap:2px;background:rgba(38,198,162,.12);border:1px solid rgba(38,198,162,.3);padding:2px 6px;border-radius:9px;font-size:9px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.3px;}
    .think-badge{display:inline-flex;align-items:center;gap:2px;background:rgba(102,187,106,.12);border:1px solid rgba(102,187,106,.3);padding:2px 6px;border-radius:9px;font-size:9px;font-weight:700;color:var(--grn);text-transform:uppercase;letter-spacing:.3px;}
    /* ══ INFO NOTICE ══ */
    .info-notice{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:11px 14px;margin-bottom:13px;font-size:12px;color:var(--mid);line-height:1.6;border-left:3px solid var(--teal);}
    .info-notice strong{color:var(--teal);}
    /* ══ PLAYER ══ */
    .player{position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(16,16,34,.98);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--bdr);padding:10px 14px 14px;transform:translateY(102%);transition:transform .35s cubic-bezier(.4,0,.2,1);}
    .player.up{transform:translateY(0);}
    .pl-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:10px;}
    .pl-ava{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--red),var(--yell));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 3px 12px rgba(255,59,92,.45);}
    .pl-info{flex:1;min-width:0;}
    .pl-name{font-size:12px;font-weight:700;color:var(--yell);display:flex;align-items:center;gap:6px;}
    .pl-stat{font-size:11px;color:var(--dim);margin-top:2px;}
    .pl-mode{font-size:10px;color:var(--mid);background:var(--card);padding:2px 7px;border-radius:8px;border:1px solid var(--bdr);}
    .prog{height:2px;background:var(--bdr);border-radius:2px;margin-top:6px;}
    .prog-f{height:100%;background:linear-gradient(90deg,var(--red),var(--yell));border-radius:2px;width:0;transition:width .5s;}
    .pl-btns{display:flex;gap:7px;}
    .pBtn{width:36px;height:36px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;font-size:14px;transition:.15s;}
    .pBtn:active{transform:scale(.88);}
    .pPlay{background:linear-gradient(135deg,var(--red),var(--yell));color:#000;font-weight:800;}
    .pStop{background:var(--bdr);color:var(--mid);}
    .wav{display:flex;align-items:center;gap:2px;height:14px;}
    .wb{width:2px;border-radius:2px;background:var(--yell);animation:wa .9s ease-in-out infinite;}
    .wb:nth-child(1){height:4px;animation-delay:0s}.wb:nth-child(2){height:11px;animation-delay:.15s}
    .wb:nth-child(3){height:14px;animation-delay:.05s}.wb:nth-child(4){height:8px;animation-delay:.2s}
    .wb:nth-child(5){height:11px;animation-delay:.1s}
    @keyframes wa{0%,100%{transform:scaleY(.35)}50%{transform:scaleY(1)}}
    /* ══ MISC ══ */
    .skel{animation:pu 1.5s ease-in-out infinite;}
    @keyframes pu{0%,100%{opacity:1}50%{opacity:.35}}
    .sk-c{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;}
    .sk-l{background:var(--bdr);border-radius:4px;margin-bottom:7px;height:11px;}
    .empty{text-align:center;padding:50px 20px;color:var(--dim);}
    .empty-i{font-size:44px;margin-bottom:12px;}
    .empty-h{font-size:15px;font-weight:700;color:var(--mid);margin-bottom:6px;}
    .toast{position:fixed;top:78px;left:50%;z-index:80;transform:translateX(-50%) translateY(-8px);opacity:0;pointer-events:none;background:var(--teal);color:#000;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;box-shadow:0 4px 18px rgba(38,198,162,.45);transition:all .25s;}
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
    .src-panel{background:var(--surf);border:1px solid var(--bdr);border-radius:12px;padding:12px 14px;margin-top:16px;}

const S = { cat:'accueil', cache:{}, cacheBySource:{}, speak:false, pause:false };
const JOURS = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
const MOIS  = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
/* ══ INIT ══ */
window.addEventListener('DOMContentLoaded', () => {
  buildTabs(); checkWelcome(); loadCat('accueil'); initVoices();

/* ══ WELCOME ══ */
function checkWelcome() {
  const today = new Date().toDateString();
  // Bump key v2 → la welcome se relance pour tout le monde aujourd'hui
  if (localStorage.getItem('infoflux_day_v2') !== today) {
    localStorage.setItem('infoflux_day_v2', today);
    renderWelcomeScreen();
  }
}
function renderWelcomeScreen() {
  const now = new Date(), h = now.getHours();
  const salut = h<6?'Bonne nuit':h<12?'Bonjour':h<18?'Bon après-midi':'Bonsoir';
  document.getElementById('wlcSalut').textContent = salut;
  document.getElementById('wlcDate').textContent =
    `${cap(JOURS[now.getDay()])} ${now.getDate()} ${MOIS[now.getMonth()]} ${now.getFullYear()}  ·  ${now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`;
  const el = document.getElementById('welcome'); el.classList.add('show');
  const bar = document.getElementById('wlcBarF'), t0 = performance.now(), DUR = 5000;
  (function step(t){ const p=Math.min((t-t0)/DUR*100,100); bar.style.width=p+'%'; if(p<100)requestAnimationFrame(step); else dismissWelcome(); })(t0);
}
function dismissWelcome() {
  const el = document.getElementById('welcome');
  el.classList.remove('show'); el.classList.add('hide');
  setTimeout(() => { el.style.display='none'; }, 650);
}
const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
/* ══ TABS ══ */
function buildTabs() {
  document.getElementById('tabs').innerHTML = Object.entries(CATS).map(([k,c]) =>
    `<div class="tab${k===S.cat?' on':''}" data-k="${k}" onclick="switchCat('${k}')">
      ${c.ico} ${c.lbl} <span class="tab-n" id="tn${k}">…</span>
    </div>`).join('');
}
function switchCat(k) {
  S.cat = k;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.k===k));
  if (S.cache[k]) renderCat(k); else loadCat(k);
}
/* ══ (modes supprimés — vue unifiée) ══ */
/* ══════════════════════════════════════════════════════
   NHK WORLD — TRADUCTION EN ANGLAIS
   1. Flux anglais officiel utilisé en priorité
   2. Si caractères japonais détectés → MyMemory API (gratuit)
══════════════════════════════════════════════════════ */
function hasJapanese(text) {
  return /[぀-鿿＀-￯]/.test(text || '');
}
async function translateToEN(text) {
  if (!text || !hasJapanese(text)) return { text, translated: false };
  try {
    const url = `${TRANSLATE_API}?q=${encodeURIComponent(text.slice(0,400))}&langpair=ja|en`;
    const r = await fetch(url);
    if (!r.ok) return { text, translated: false };
    const d = await r.json();
    const t = d.responseData?.translatedText;
    return t && t !== text ? { text: t, translated: true } : { text, translated: false };
  } catch { return { text, translated: false }; }
}
async function processNHKArticles(arts) {
  return Promise.all(arts.map(async a => {
    if (!hasJapanese(a.title) && !hasJapanese(a.desc)) return a;
    const [tTitle, tDesc] = await Promise.all([
      translateToEN(a.title),
      translateToEN(a.desc),
    ]);
    return { ...a, title: tTitle.text, desc: tDesc.text, translated: tTitle.translated || tDesc.translated };
  }));
}
/* ══ FETCH RSS — proxies CORS en cascade (timeout 5s) ══ */
const PROXY_TIMEOUT = 5000;
async function fetchFeed(url) {
  try {
    const c=new AbortController(), tid=setTimeout(()=>c.abort(),PROXY_TIMEOUT);
    const r=await fetch(`${P1}${encodeURIComponent(url)}`,{signal:c.signal});
    clearTimeout(tid);
    if (r.ok) { const d=await r.json(); if(d.contents) { const a=parseXML(d.contents); if(a.length) return a; } }
  } catch {}
  try {
    const c=new AbortController(), tid=setTimeout(()=>c.abort(),PROXY_TIMEOUT);
    const r=await fetch(`${P2}${encodeURIComponent(url)}`,{signal:c.signal});
    clearTimeout(tid);
    if (r.ok) { const a=parseXML(await r.text()); if(a.length) return a; }
  } catch {}
  try {
    const c=new AbortController(), tid=setTimeout(()=>c.abort(),PROXY_TIMEOUT);
    const r=await fetch(`${P3}${encodeURIComponent(url)}`,{signal:c.signal});
    clearTimeout(tid);
    if (r.ok) { const a=parseXML(await r.text()); if(a.length) return a; }
  } catch {}
  try {
    const c=new AbortController(), tid=setTimeout(()=>c.abort(),PROXY_TIMEOUT);
    const r=await fetch(`${P4}${encodeURIComponent(url)}`,{signal:c.signal});
    clearTimeout(tid);
    if (r.ok) {
      const d=await r.json();
      if (d.status==='ok' && Array.isArray(d.items)) {
        return d.items.slice(0,10).map(it=>({
          title: it.title||'', link: it.link||'',
          desc: strip(it.description||it.content||''),
          date: it.pubDate||''
        })).filter(a=>a.title.length>3);
      }
    }
  } catch {}
  return [];
}
/* ══ CACHE LOCALSTORAGE — 30 min TTL ══ */
const CACHE_TTL = 30 * 60 * 1000;
function cacheGet(k) {
  try {
    const raw = localStorage.getItem('infoflux_cat_'+k);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (Date.now() - obj.t > CACHE_TTL) return null;
    return obj.d;
  } catch { return null; }
}
function cacheSet(k, arts) {
  try {
    localStorage.setItem('infoflux_cat_'+k, JSON.stringify({t:Date.now(), d:arts}));
  } catch {} // localStorage plein → ignore
}
function cacheClear() {
  Object.keys(CATS).forEach(k => localStorage.removeItem('infoflux_cat_'+k));
}
function parseXML(raw) {
  try {
    const doc = new DOMParser().parseFromString(raw,'text/xml');
    const items = [...doc.querySelectorAll('item'),...doc.querySelectorAll('entry')];
    return items.slice(0,10).map(it=>({
      title: decode(tv(it,'title')),
      link:  tv(it,'link')||it.querySelector('link')?.getAttribute('href')||'',
      desc:  decode(strip(tv(it,'description')||tv(it,'summary')||tv(it,'content')||'')),
      date:  tv(it,'pubDate')||tv(it,'published')||tv(it,'updated')||'',
    })).filter(a=>a.title.length>3);
  } catch { return []; }
}
const tv    = (el,tag) => el.querySelector(tag)?.textContent?.trim()||'';
const strip = h => h.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();
const decode= s => s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#039;/g,"'").replace(/&nbsp;/g,' ').trim();
const esc   = s => (s||'').replace(/"/g,'&quot;');
function ago(ds) {
  if (!ds) return '';
  try {
    const m = Math.floor((Date.now()-new Date(ds))/60000);
    if(m<1) return "À l'instant"; if(m<60) return `il y a ${m} min`;
    if(m<1440) return `il y a ${Math.floor(m/60)}h`; return `il y a ${Math.floor(m/1440)} j`;
  } catch { return ''; }
}
function filterRecent(arts) {
  const cut = Date.now() - 30*24*60*60*1000;
  return arts.filter(a => { if(!a.date)return true; const d=new Date(a.date); return isNaN(d.getTime())||d.getTime()>cut; });
}
function sortFrFirst(arts) {
  return [...arts].sort((a,b) => {
    const af=a.flag==='🇫🇷'?0:1, bf=b.flag==='🇫🇷'?0:1;
    if(af!==bf) return af-bf;
    return new Date(b.date||0)-new Date(a.date||0);
  });
}
/* ══════════════════════════════════════════════════════
   FILTRE AUDIENCES — uniquement chiffres box-office / TV
══════════════════════════════════════════════════════ */
const AUD_RE = /\b(box[\s-]?office|audience[s]?|millions?\s+(?:de\s+)?(?:spectateurs|téléspectateurs|entrées|viewers|dollars?|\$)|parts?\s+d['']?audience|\bPdA\b|\bM\$|\$\s?\d+[MB]?|opening\s+weekend|première\s+semaine|grosses?|recettes?|rating[s]?|viewership|prime[\s-]?time|en\s+tête\s+des\s+audiences?|leader\s+des\s+audiences?|topped\s+(?:the\s+)?(?:chart|box)|premiered\s+to|debuts?\s+(?:at|with)|médiamétr|nielsen|chart[\s-]?topp|\bcume\b|\bcrowd\b\s+of|\bdrew\b\s+\d|spectateurs|téléspectateurs|entrées\s+(?:cinéma|salles)|nombre\s+de\s+vues|streams?|téléchargements?|abonnés)/i;
function audiencesFilter(a) {
  const text = (a.title||'') + ' ' + (a.desc||'');
  return AUD_RE.test(text);
}
/* ══════════════════════════════════════════════════════
   DÉDUP CROSS-CATÉGORIE — priorité du plus spécifique au plus général
══════════════════════════════════════════════════════ */
const CAT_PRIORITY = ['audiences','foot','economy','tech','deeper','media','actu','accueil'];
function articleKey(a) {
  return ((a.link || a.title) + '').toLowerCase().replace(/[^a-z0-9]+/g,'').slice(0,100);
}
function getDedupedArtsFor(k) {
  const myArts = S.cache[k] || [];
  if (k === 'audiences') {
    return myArts.filter(audiencesFilter);
  }
  const myIdx = CAT_PRIORITY.indexOf(k);
  if (myIdx < 0) return myArts;
  const claimed = new Set();
  for (let i = 0; i < myIdx; i++) {
    const cat = CAT_PRIORITY[i];
    const cArts = S.cache[cat] || [];
    const filtered = (cat === 'audiences') ? cArts.filter(audiencesFilter) : cArts;
    filtered.forEach(a => claimed.add(articleKey(a)));
  }
  return myArts.filter(a => !claimed.has(articleKey(a)));
}
/* ══════════════════════════════════════════════════════
   EXTRACTION DE PHRASES — 0 invention, juste du desc nettoyé
══════════════════════════════════════════════════════ */
function extractSentences(desc, n=1) {
  if (!desc) return '';
  const cleaned = desc.replace(/\s+/g,' ').replace(/\[…\]|…$|\.\.\.$/,'').trim();
  const parts = cleaned.split(/(?<=[.!?])\s+/).filter(s => s.length > 12);
  return parts.slice(0, n).join(' ').trim();
}
/* ══════════════════════════════════════════════════════
   GROUP BY SOURCE — 3 articles max par source
   Préserve l'ordre des sources tel que défini dans CATS
══════════════════════════════════════════════════════ */
function groupBySource(arts, feedsDef) {
  // On crée un Map ordonné selon l'ordre des feeds définis
  const order = feedsDef.map(f => f.n);
  const map = new Map();
  order.forEach(n => map.set(n, null));
  arts.forEach(a => {
    if (!map.has(a.src)) map.set(a.src, null);
    const entry = map.get(a.src);
    if (!entry) {
      map.set(a.src, { flag:a.flag, nhk:a.nhk||false, radio:a.radio||false, articles:[a] });
    } else if (entry.articles.length < 3) {
      entry.articles.push(a);
    }
  });
  // Retourner uniquement ceux qui ont des articles
  return [...map.entries()].filter(([,v]) => v && v.articles.length > 0);
}
/* ══ LOAD / CACHE ══ */
async function loadCat(k, force=false) {
  // 1. Cache localStorage : si frais (<30 min) et pas forcé, on l'utilise direct
  if (!force) {
    const cached = cacheGet(k);
    if (cached) {
      S.cache[k] = cached;
      S.cacheBySource[k] = groupBySource(cached, CATS[k].feeds);
      const tn = document.getElementById(`tn${k}`);
      if (tn) tn.textContent = cached.length || '–';
      if (S.cat === k) renderCat(k);
      return;
    }
  }
  // 2. Sinon fetch réseau
  if (S.cat===k) document.getElementById('feed').innerHTML = skelHTML();
  const seen = new Set();
  const uFeeds = CATS[k].feeds.filter(f => {
    const key = f.u+(f.sub||f.grp||'');
    if(seen.has(key)) return false; seen.add(key); return true;
  });
  let all = (await Promise.all(
    uFeeds.map(async f => {
      let arts = await fetchFeed(f.u);
      if (f.nhk) arts = await processNHKArticles(arts);
      return arts.map(a => ({...a, src:f.n, flag:f.f, sub:f.sub||'', grp:f.grp||'', cat:f.cat||'', radio:f.radio||false, nhk:f.nhk||false}));
    })
  )).flat();
  all = filterRecent(all);
  if (CATS[k].frFirst) all = sortFrFirst(all);
  else all = all.sort((a,b) => new Date(b.date||0)-new Date(a.date||0));
  S.cache[k] = all;
  S.cacheBySource[k] = groupBySource(all, CATS[k].feeds);
  cacheSet(k, all); // sauvegarde pour les 30 prochaines minutes
  const tn = document.getElementById(`tn${k}`);
  if (tn) tn.textContent = all.length||'–';
  // Re-rend la catégorie courante à chaque chargement (dédup cross-catégorie à jour)
  if (S.cache[S.cat]) renderCat(S.cat);
}

/* ── Construction d'un paragraphe à partir de N articles — extraits factuels uniquement ── */
function buildSynthParagraph(articles) {
  if (!articles.length) return 'Aucune actualité disponible aujourd\'hui dans cette catégorie.';
  const CONN = ['Par ailleurs, ', 'À noter, ', 'Du côté de ', 'Également, ', 'On apprend que '];
  return articles.map((a, i) => {
    const ctx = extractSentences(a.desc, 1);
    const ctxClause = ctx ? ` ${ctx}${/[.!?]$/.test(ctx)?'':'.'}` : '.';
    if (i === 0) return `${a.src} ouvre la journée avec « ${a.title} ».${ctxClause}`;
    if (i === articles.length - 1) return `Enfin, ${a.src} : « ${a.title} ».${ctxClause}`;
    const conn = CONN[(i-1) % CONN.length];
    return `${conn}${a.src} signale « ${a.title} ».${ctxClause}`;
  }).join(' ');
}
/* ── Flux Time to Read : 4 paragraphes de synthèse + grille des autres articles ── */

  if (useSubs && rest.some(a=>a.sub||a.cat)) {
    const gKey = k==='accueil'?'cat':'sub';
    const groups = {};
    rest.forEach(a=>{ const key=a[gKey]||'Autres'; if(!groups[key])groups[key]=[]; if(!groups[key].some(x=>x.title===a.title))groups[key].push(a); });
    gridHTML = Object.entries(groups).map(([grp,items])=>
      `<div class="subcat-hdr" style="--cc:${col}"><span>${grp}</span></div>
       <div class="grid">${items.slice(0,9).map(a=>cardHTML(a,col,isDeep)).join('')}</div>`).join('');
  } else if (useGrps && rest.some(a=>a.grp)) {
    const groups = {};
    rest.filter(a=>!a.radio).forEach(a=>{ const key=a.grp||'Actualités'; if(!groups[key])groups[key]=[]; if(!groups[key].some(x=>x.title===a.title))groups[key].push(a); });
    gridHTML = Object.entries(groups).map(([grp,items])=>
      `<div class="subcat-hdr" style="--cc:${col}"><span>${grp}</span></div>
       <div class="grid">${items.slice(0,6).map(a=>cardHTML(a,col,false)).join('')}</div>`).join('');
  } else if (rest.length) {
    gridHTML = `<div class="grid">${rest.map(a=>cardHTML(a,col,isDeep)).join('')}</div>`;
  }
  return synthBlock + gridHTML;
}

/* ══ VOIX — 1.25x vitesse radio ══ */
function initVoices() { if(!window.speechSynthesis)return; speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices(); }
function bestVoice() {
  const vs = speechSynthesis.getVoices();
  const fr = vs.filter(v => v.lang.startsWith('fr'));
  // 1. Voix Premium / Enhanced / Neural / Wavenet — les plus naturelles
  const premium = fr.find(v => /premium|enhanced|neural|wavenet|natural|online|google/i.test(v.name));
  if (premium) return premium;
  // 2. Voix réseau (typiquement Google Chrome) — moins robotiques que les voix locales
  const network = fr.find(v => v.localService === false);
  if (network) return network;
  // 3. Voix Apple récentes (Siri, Eloquence) — plus naturelles que les anciennes
  for (const n of ['Aurélie','Marie','Audrey','Amélie','Daniel','Thomas']) {
    const v = fr.find(v => v.name.includes(n));
    if (v) return v;
  }
  return fr[0] || vs[0] || null;
}
/* ══ SCRIPT AUDIO — 2 modes : 'short' (~5 min) et 'full' (intégral) ══
   Cible 5 min = ~1100 mots à 1.25x = ~6500 caractères.
   Toujours basé sur l'extraction factuelle des articles : zéro invention. */
function buildScript(mode='short') {
  const arts = getDedupedArtsFor(S.cat);
  const cfg = CATS[S.cat];
  const now = new Date(), h=now.getHours(), mn=String(now.getMinutes()).padStart(2,'0');
  const heure = mn==='00'?`${h} heures`:`${h} heures ${mn}`;
  const salut = h<12?'Bonjour Pierre-Antoine':h<18?'Bon après-midi Pierre-Antoine':'Bonsoir Pierre-Antoine';
  const dte = `${JOURS[now.getDay()]} ${now.getDate()} ${MOIS[now.getMonth()]} ${now.getFullYear()}`;
  const mainArts = arts.filter(a=>!a.radio);
  const radioArts = arts.filter(a=>a.radio);
  let s = '';

  if (mode === 'full') {
    s = `InfoFlux. Édition intégrale. ${salut}. Nous sommes le ${dte}, il est ${heure}. Catégorie ${cfg.lbl}. `;
    if (radioArts.length) {
      s += `Pour commencer, les matinales radio. `;
      radioArts.forEach(a => { s += `${a.src} : ${a.title}. `; });
    }
    s += `Tous les articles. `;
    mainArts.forEach(a => {
      const d = extractSentences(a.desc, 2);
      s += `${a.src} : ${a.title}. ${d}${d && !/[.!?]$/.test(d)?'.':''} `;
    });
    return s + `Fin de l'édition intégrale. InfoFlux, à très vite.`;
  }

  // mode === 'short' → cible ~5 min ≈ 6500 chars
  s = `InfoFlux. Synthèse 5 minutes. ${salut}. Nous sommes le ${dte}, il est ${heure}. Catégorie ${cfg.lbl}. `;
  if (radioArts.length) {
    s += `Ce matin sur les ondes : `;
    radioArts.slice(0,3).forEach(a => { s += `${a.src} ouvre avec « ${a.title} ». `; });
  }
  // Bloc principal : on remplit jusqu'à atteindre ~6000 chars
  const TARGET = 6000;
  const CONN = ['Par ailleurs, ', 'À noter, ', 'Du côté de ', 'Également, ', 'On apprend que ', 'Côté actualité, ', 'Autre information, '];
  s += `À la une de cette synthèse. `;
  let i = 0;
  for (const a of mainArts) {
    if (s.length >= TARGET) break;
    const d = extractSentences(a.desc, 2);
    const dClause = d ? ` ${d}${/[.!?]$/.test(d)?'':'.'}` : '.';
    if (i === 0) s += `${a.src} fait la une avec « ${a.title} ».${dClause} `;
    else {
      const conn = CONN[(i-1) % CONN.length];
      s += `${conn}${a.src} : « ${a.title} ».${dClause} `;
    }
    i++;
  }
  return s + `Voilà pour cette synthèse de 5 minutes. Bonne ${h<18?'journée':'soirée'}, InfoFlux.`;
}
function startShortListen() {
  document.getElementById('plMode').textContent = 'Synthèse 5 min';
  document.getElementById('btnShort').classList.add('playing');
  speak(buildScript('short'));
}
function startFullListen() {
  document.getElementById('plMode').textContent = 'Intégral';
  document.getElementById('btnIntegral').classList.add('playing');
  speak(buildScript('full'));
}
function speak(script) {
  if(!window.speechSynthesis){showToast('❌ Synthèse vocale non supportée');return;}
  speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(script), voice=bestVoice();
  if(voice)utt.voice=voice; utt.lang='fr-FR'; utt.rate=1.0; utt.pitch=1.0; utt.volume=1;
  const total=script.length;
  utt.onboundary=e=>{const p=Math.round(e.charIndex/total*100);document.getElementById('progF').style.width=p+'%';document.getElementById('plStat').textContent=`En lecture · ${p}%`;};
  utt.onend=()=>{S.speak=S.pause=false;upUI();document.getElementById('progF').style.width='100%';document.getElementById('plStat').textContent='Lecture terminée ✓';clearAudioBtns();setTimeout(hidePlayer,4000);};
  utt.onerror=()=>{S.speak=S.pause=false;upUI();clearAudioBtns();};
  S.speak=true;S.pause=false;speechSynthesis.speak(utt);showPlayer();upUI();
}
function playPause(){if(!S.speak)startShortListen();else if(S.pause)resumeS();else pauseS();}
function pauseS(){speechSynthesis.pause();S.pause=true;upUI();}
function resumeS(){speechSynthesis.resume();S.pause=false;upUI();}
function clearAudioBtns(){document.getElementById('btnShort').classList.remove('playing');document.getElementById('btnIntegral').classList.remove('playing');}
function stopAll(){speechSynthesis.cancel();S.speak=S.pause=false;clearAudioBtns();hidePlayer();upUI();}
function showPlayer(){document.getElementById('player').classList.add('up');}
function hidePlayer(){document.getElementById('player').classList.remove('up');}
function upUI(){
  const pp=document.getElementById('btnPP'),wav=document.getElementById('wav');
  if(S.speak&&!S.pause){pp.textContent='⏸';wav.style.display='flex';}
  else{pp.textContent='▶';wav.style.display='none';}
}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');setTimeout(()=>el.classList.remove('on'),3000);}
</script>
